        .container { max-width: 1200px; margin: 0 auto; }

        .filters { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .filter-group { flex: 1; min-width: 200px; }
        .filter-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        select:focus, input:focus { outline: none; border-color: #667eea; }
        .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .quick-tag { padding: 8px 16px; background: #f0f0f0; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s; border: none; }
        .quick-tag:hover { background: #667eea; color: white; }
        .quick-tag.active { background: #667eea; color: white; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .major-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: transform 0.3s, box-shadow 0.3s; }
        .major-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .major-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .major-name { font-size: 18px; font-weight: 700; color: #333; }
        .major-code { background: #667eea; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .major-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .info-item { background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .info-label { font-size: 12px; color: #666; margin-bottom: 4px; }
        .info-value { font-size: 14px; font-weight: 600; color: #333; }
        .national-line { background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%); padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .line-title { font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 600; }
        .line-years { display: flex; gap: 8px; flex-wrap: wrap; }
        .line-year { padding: 6px 12px; background: white; border-radius: 6px; font-size: 12px; border-left: 3px solid #667eea; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { padding: 4px 10px; background: #e8f4f8; color: #0066cc; border-radius: 4px; font-size: 12px; }
        .tag.difficulty-easy { background: #e8f5e9; color: #2e7d32; }
        .tag.difficulty-medium { background: #fff3e0; color: #ef6c00; }
        .tag.difficulty-hard { background: #ffebee; color: #c62828; }
        .no-results { text-align: center; padding: 40px; color: white; font-size: 18px; }
        .stats { background: rgba(255,255,255,0.1); padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; color: white; text-align: center; }
        .footer { text-align: center; color: rgba(255,255,255,0.8); margin-top: 30px; font-size: 13px; }
    </style>

        ];

        // 学科门类名称
        const categoryNames = {
            "01": "哲学", "02": "经济学", "03": "法学", "04": "教育学",
            "05": "文学", "06": "历史学", "07": "理学", "08": "工学",
            "09": "农学", "10": "医学", "11": "军事学", "12": "管理学",
            "13": "艺术学", "14": "交叉学科"
        };

        // 获取国家线
        function getNationalLine(code, category) {
            const lines = {};
            
            for (const year of [2025, 2024, 2023]) {
                const yearLines = nationalLines[year];
                
                // 特殊专业匹配
                if (code.startsWith("1251") || code.startsWith("1254")) {
                    lines[year] = yearLines["1251"];
                } else if (code.startsWith("1252")) {
                    lines[year] = yearLines["1252"];
                } else if (code.startsWith("1253") || code.startsWith("1257")) {
                    lines[year] = yearLines["1253"];
                } else if (code.startsWith("1255")) {
                    lines[year] = yearLines["1255"];
                } else if (code.startsWith("1256")) {
                    lines[year] = yearLines["1256"];
                } else if (code.startsWith("0403") || code.startsWith("0452")) {
                    lines[year] = yearLines["0403"];
                } else if (code.startsWith("0451") || code.startsWith("0453")) {
                    lines[year] = yearLines["0451"];
                } else {
                    lines[year] = yearLines[category] || yearLines["08"];
                }
            }
            
            return lines;
        }

        // 初始化学科门类选择器
        function initCategorySelect() {
            const select = document.getElementById('categorySelect');
            Object.entries(categoryNames).forEach(([code, name]) => {
                const option = document.createElement('option');
                option.value = code;
                option.textContent = `[${code}] ${name}`;
                select.appendChild(option);
            });
        }

        // 更新专业选择器
        function updateMajorSelect(category) {
            const majorSelect = document.getElementById('majorSelect');
            majorSelect.innerHTML = '<option value="">全部专业</option>';
            
            const filteredMajors = category 
                ? majors.filter(m => m.category === category)
                : majors;
            
            const uniqueNames = [...new Set(filteredMajors.map(m => m.name))];
            uniqueNames.sort().forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                majorSelect.appendChild(option);
            });
        }

        // 渲染专业卡片
        function renderMajors(filteredMajors) {
            const container = document.getElementById('results');
            
            if (filteredMajors.length === 0) {
                container.innerHTML = '<div class="no-results">未找到匹配的专业</div>';
                return;
            }
            
            container.innerHTML = filteredMajors.map(major => {
                const lines = getNationalLine(major.code, major.category);
                const difficultyClass = major.difficulty === 'easy' ? 'difficulty-easy' : 
                                        major.difficulty === 'hard' ? 'difficulty-hard' : 'difficulty-medium';
                
                return `
                    <div class="major-card">
                        <div class="major-header">
                            <div class="major-name">${major.name}</div>
                            <div class="major-code">${major.code}</div>
                        </div>
                        <div class="major-info">
                            <div class="info-item">
                                <div class="info-label">学科门类</div>
                                <div class="info-value">${categoryNames[major.category]}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">学位类型</div>
                                <div class="info-value">${major.degree}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">学费参考</div>
                                <div class="info-value">${major.tuition}元/年</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">跨考难度</div>
                                <div class="info-value">${major.difficulty === 'easy' ? '较低' : major.difficulty === 'hard' ? '较高' : '中等'}</div>
                            </div>
                        </div>
                        <div class="national-line">
                            <div class="line-title">国家线（A类考生）</div>
                            <div class="line-years">
                                ${Object.entries(lines).map(([year, line]) => 
                                    `<div class="line-year">${year}: ${line.total}/${line.single}/${line.composite}</div>`
                                ).join('')}
                            </div>
                        </div>
                        <div class="schools-list" style="margin-top:12px;padding:10px;background:#f8f9fa;border-radius:8px;">
                            <div style="font-size:12px;color:#666;margin-bottom:8px;font-weight:600;">推荐院校（可直接点击访问官网）：</div>
                            <div style="display:flex;flex-wrap:wrap;gap:6px;">
                                ${major.schools.map(school => 
                                    `<a href="${school.url}" target="_blank" style="display:inline-block;padding:4px 10px;background:white;border:1px solid #e0e0e0;border-radius:4px;font-size:12px;color:#667eea;text-decoration:none;transition:all 0.2s;" onmouseover="this.style.background='#667eea';this.style.color='white';" onmouseout="this.style.background='white';this.style.color='#667eea';">${school.name}</a>`
                                ).join('')}
                            </div>
                        </div>
                        <div class="tags">
                            <span class="tag ${difficultyClass}">${major.difficulty === 'easy' ? '难度较低' : major.difficulty === 'hard' ? '难度较高' : '难度中等'}</span>
                            ${major.crossPossible ? '<span class="tag">可跨考</span>' : '<span class="tag" style="background:#fff3e0;color:#e65100">需相关背景</span>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 筛选逻辑
        function filterMajors() {
            const category = document.getElementById('categorySelect').value;
            const majorName = document.getElementById('majorSelect').value;
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            
            let filtered = majors;
            
            if (category) {
                filtered = filtered.filter(m => m.category === category);
            }
            
            if (majorName) {
                filtered = filtered.filter(m => m.name === majorName);
            }
            
            if (keyword) {
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(keyword) || 
                    m.code.includes(keyword)
                );
            }
            
            renderMajors(filtered);
            updateStats(filtered.length);
        }

        // 更新统计
        function updateStats(count) {
            document.getElementById('stats').textContent = 
                `当前显示 ${count} 个专业，共收录 539 个专业，覆盖 14 个学科门类`;
        }

        // 快捷标签事件
        document.querySelectorAll('.quick-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                // 移除所有active状态
                document.querySelectorAll('.quick-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                // 获取category值
                const category = this.dataset.category;
                
                if (category) {
                    // 直接设置categorySelect
                    const categorySelect = document.getElementById('categorySelect');
                    categorySelect.value = category;
                    
                    // 更新专业下拉框
                    updateMajorSelect(category);
                    
                    // 筛选专业
                    filterMajors();
                } else if (this.dataset.difficulty) {
                    document.getElementById('searchInput').value = '';
                    document.getElementById('categorySelect').value = '';
                    updateMajorSelect('');
                    filterMajors();
                }
            });
        });

        // 事件绑定
        document.getElementById('categorySelect').addEventListener('change', function() {
            updateMajorSelect(this.value);
            filterMajors();
        });
        
        document.getElementById('majorSelect').addEventListener('change', filterMajors);
        document.getElementById('searchInput').addEventListener('input', filterMajors);

        // 初始化
        initCategorySelect();
        updateMajorSelect('');
        renderMajors(majors);
    </script>

        <div style="margin-top: 40px; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; color: white; text-align: center;">
            <h3 style="margin: 0 0 10px 0;">📚 数据来源说明</h3>
            <p style="margin: 0; font-size: 14px; opacity: 0.9;">部分院校数据来源于研招网专业目录（https://yz.chsi.com.cn）</p>
        </div>
    </div>
